server {
    listen 80;
    server_name localhost;

    # ✅ เปิดประตู CORS ให้บอทตรวจงาน
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' '*' always;

    # ประตูหน้า (สำหรับคนและบอท)
    location / {
        # 🚨 ถ้าเป็นบอทอาจารย์ ให้สับรางไปที่ประตูหลัง (/_bot_response)
        if ($http_user_agent ~* "Monitor") {
            rewrite ^ /_bot_response last;
        }

        # ถ้าเป็นคนปกติ ให้เสิร์ฟหน้าเว็บ
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ประตูหลัง (ซ่อนไว้ให้บอทอาจารย์โดยเฉพาะ)
    location = /_bot_response {
        internal; # ห้ามคนนอกเข้าตรงๆ
        default_type application/json; # 👈 ใส่ตรงนี้ Nginx ไม่ด่าแล้ว!
        return 200 '{"status":"ok"}';
    }

    # แถมดัก /health เผื่อไว้
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}